  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #82a7f7;
      font-family: 'Galmuri9', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .back-button {
      position: fixed;
      top: 2.1%; right: 30px;
      padding: 4px 12px; cursor: pointer; 
      z-index: 100;
      color: #111;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      letter-spacing: 0.05em;
      opacity: 0.5;
      transition: opacity 0.2s;
      
    }
    .back-button:hover { opacity: 1; }
    .tooltip {
      position: fixed;
      pointer-events: none;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: #111;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      z-index: 200;
    }
    .tooltip.visible { opacity: 1; }
    .dot-link {
      position: absolute;
      display: block;
      cursor: grab;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 7px #fff, 0 0 10px #fff, 0 0 20px #fff;
      overflow: hidden;
      will-change: transform;
      user-select: none;
    }
    .dot-link.dragging { cursor: grabbing; box-shadow: 0 0 0 2px #999; }
    .dot-link:hover { box-shadow: 0 0 0 5px #fff; }
    .dot-link img {
      display: block;
      width: 100%; height: 100%;
      object-fit: contain;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
